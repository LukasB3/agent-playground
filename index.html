<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 Gewinnt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
    }

    h1 { margin-bottom: 1rem; font-size: 2rem; }

    .status {
      font-size: 1.25rem;
      margin-bottom: 1.25rem;
      min-height: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .board-wrap {
      background: #0f3460;
      border-radius: 12px;
      padding: 10px;
    }

    /* Column hover targets sit above the board */
    .col-targets {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 4px;
    }

    .col-btn {
      height: clamp(24px, 5vw, 36px);
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9rem, 3vw, 1.25rem);
      color: transparent;
      transition: color 0.15s;
    }

    .col-btn:hover { color: #e0e0e0; }
    .col-btn:disabled { cursor: not-allowed; }
    .col-btn.red-turn:hover { color: #e94560; }
    .col-btn.yellow-turn:hover { color: #ffd700; }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .cell {
      width: clamp(36px, 10vw, 72px);
      height: clamp(36px, 10vw, 72px);
      background: #1a1a2e;
      border-radius: 50%;
      transition: background 0.12s;
    }

    .cell.red   { background: #e94560; }
    .cell.yellow { background: #ffd700; }

    .cell.win {
      animation: pulse 0.5s ease-in-out 4;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50%       { transform: scale(1.15); filter: brightness(1.4); }
    }

    button.reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>4 Gewinnt</h1>
  <div class="status" id="status"></div>

  <div class="board-wrap">
    <div class="col-targets" id="col-targets"></div>
    <div class="grid" id="grid"></div>
  </div>

  <button class="reset" id="reset">Neues Spiel</button>

  <script>
    const COLS = 7, ROWS = 6;

    const gridEl      = document.getElementById('grid');
    const colTargets  = document.getElementById('col-targets');
    const statusEl    = document.getElementById('status');
    const resetBtn    = document.getElementById('reset');

    // board[row][col], row 0 = top
    let board, turn, gameOver, cells, colBtns;

    function init() {
      board    = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      turn     = 'red';
      gameOver = false;

      // Build column drop buttons
      colTargets.innerHTML = '';
      colBtns = [];
      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.className = 'col-btn red-turn';
        btn.textContent = '▼';
        btn.dataset.col = c;
        btn.addEventListener('click', () => drop(Number(btn.dataset.col)));
        colTargets.appendChild(btn);
        colBtns.push(btn);
      }

      // Build cells — rendered top-to-bottom
      gridEl.innerHTML = '';
      cells = [];
      for (let r = 0; r < ROWS; r++) {
        cells[r] = [];
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          gridEl.appendChild(cell);
          cells[r][c] = cell;
        }
      }

      setStatus();
    }

    function playerLabel(p) {
      const name  = p === 'red' ? 'Du' : 'Computer';
      const color = p === 'red' ? '#e94560' : '#ffd700';
      return `<span style="color:${color};font-weight:bold">${name}</span>`;
    }

    function setStatus(msg) {
      if (msg !== undefined) {
        statusEl.innerHTML = msg;
      } else {
        statusEl.innerHTML = turn === 'red'
          ? `${playerLabel('red')} bist dran`
          : `<span style="color:#ffd700;font-weight:bold">Computer</span> denkt nach...`;
      }
    }

    function drop(col) {
      if (gameOver) return;
      if (turn !== 'red') return; // block input during computer turn

      placepiece(col, 'red');
    }

    function placepiece(col, player) {
      // Find lowest empty row in this column
      let row = -1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (!board[r][col]) { row = r; break; }
      }
      if (row === -1) return false; // column full

      board[row][col] = player;
      cells[row][col].classList.add(player);

      const winCells = checkWin(row, col);
      if (winCells) {
        gameOver = true;
        winCells.forEach(([r, c]) => cells[r][c].classList.add('win'));
        if (player === 'red') {
          setStatus(`${playerLabel('red')} gewinnst! 🎉`);
        } else {
          setStatus(`${playerLabel('yellow')} gewinnt! 🤖`);
        }
        colBtns.forEach(b => b.disabled = true);
        return true;
      }

      if (board[0].every((v, c) => board[0][c])) {
        gameOver = true;
        setStatus('Unentschieden!');
        colBtns.forEach(b => b.disabled = true);
        return true;
      }

      turn = player === 'red' ? 'yellow' : 'red';
      updateColButtons();
      setStatus();

      if (turn === 'yellow') {
        // Disable buttons while computer thinks
        colBtns.forEach(b => b.disabled = true);
        setTimeout(computerMove, 500);
      }

      return true;
    }

    function computerMove() {
      if (gameOver) return;
      const col = pickBestColumn();
      placepiece(col, 'yellow');
    }

    // Returns the lowest available row for a column on a given board state
    function lowestRow(b, col) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (!b[r][col]) return r;
      }
      return -1;
    }

    // Check win on an arbitrary board state after placing at (row, col)
    function checkWinOn(b, row, col) {
      const player = b[row][col];
      const directions = [[0,1],[1,0],[1,1],[1,-1]];
      for (const [dr, dc] of directions) {
        let count = 1;
        for (const sign of [1, -1]) {
          let r = row + dr * sign, c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && b[r][c] === player) {
            count++;
            r += dr * sign;
            c += dc * sign;
          }
        }
        if (count >= 4) return true;
      }
      return false;
    }

    // Score a column for the AI: higher = better
    function scoreColumn(col, player) {
      const row = lowestRow(board, col);
      if (row === -1) return -Infinity;

      // Simulate placing
      board[row][col] = player;
      const wins = checkWinOn(board, row, col);
      board[row][col] = null;

      if (wins) return 1000;

      // Count potential sequences of 3 for this player
      let score = 0;
      const directions = [[0,1],[1,0],[1,1],[1,-1]];
      board[row][col] = player;
      for (const [dr, dc] of directions) {
        let count = 1;
        for (const sign of [1, -1]) {
          let r = row + dr * sign, c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
            count++;
            r += dr * sign;
            c += dc * sign;
          }
        }
        if (count >= 3) score += 10;
        else if (count >= 2) score += 3;
      }
      board[row][col] = null;

      // Prefer center columns
      const centerBonus = [0, 1, 2, 4, 2, 1, 0];
      score += centerBonus[col];

      return score;
    }

    function pickBestColumn() {
      // 1. Check if computer can win immediately
      for (let c = 0; c < COLS; c++) {
        const row = lowestRow(board, c);
        if (row === -1) continue;
        board[row][c] = 'yellow';
        const wins = checkWinOn(board, row, c);
        board[row][c] = null;
        if (wins) return c;
      }

      // 2. Block player from winning
      for (let c = 0; c < COLS; c++) {
        const row = lowestRow(board, c);
        if (row === -1) continue;
        board[row][c] = 'red';
        const wins = checkWinOn(board, row, c);
        board[row][c] = null;
        if (wins) return c;
      }

      // 3. Pick highest-scoring column
      let bestCol = -1, bestScore = -Infinity;
      for (let c = 0; c < COLS; c++) {
        const s = scoreColumn(c, 'yellow');
        if (s > bestScore) { bestScore = s; bestCol = c; }
      }
      return bestCol;
    }

    function updateColButtons() {
      colBtns.forEach((btn, c) => {
        btn.className = 'col-btn red-turn';
        btn.disabled  = !!board[0][c] || turn !== 'red';
      });
    }

    function checkWin(row, col) {
      const player = board[row][col];
      const directions = [[0,1],[1,0],[1,1],[1,-1]];

      for (const [dr, dc] of directions) {
        const line = [[row, col]];

        for (const sign of [1, -1]) {
          let r = row + dr * sign, c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
            line.push([r, c]);
            r += dr * sign;
            c += dc * sign;
          }
        }

        if (line.length >= 4) return line;
      }
      return null;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 Gewinnt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
    }

    h1 { margin-bottom: 1rem; font-size: 2rem; }

    .status {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      min-height: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .indicator {
      width: 1.2rem;
      height: 1.2rem;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .indicator.red { background: #e94560; }
    .indicator.yellow { background: #ffd700; }

    .board-wrapper {
      background: #0f3460;
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
    }

    .col-buttons {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .col-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-size: 1.2rem;
      color: #e0e0e0;
      border-radius: 4px;
      transition: background 0.15s;
      line-height: 1;
    }

    .col-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
    .col-btn:disabled { cursor: default; opacity: 0.3; }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
    }

    .cell {
      width: clamp(40px, 8vw, 72px);
      height: clamp(40px, 8vw, 72px);
      border-radius: 50%;
      background: #1a1a2e;
      transition: background 0.2s;
    }

    .cell.red { background: #e94560; }
    .cell.yellow { background: #ffd700; }

    .cell.win {
      animation: pulse 0.5s ease-in-out 3;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    button.reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>4 Gewinnt</h1>
  <div class="status" id="status"></div>
  <div class="board-wrapper">
    <div class="col-buttons" id="col-buttons"></div>
    <div class="board" id="board"></div>
  </div>
  <button class="reset" id="reset">Neues Spiel</button>

  <script>
    const ROWS = 6, COLS = 7;
    const boardEl = document.getElementById('board');
    const colButtonsEl = document.getElementById('col-buttons');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    let grid, turn, gameOver, cells, colBtns;

    function init() {
      grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      turn = 'red';
      gameOver = false;

      // Build column drop buttons
      colButtonsEl.innerHTML = '';
      colBtns = [];
      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.className = 'col-btn';
        btn.textContent = '▼';
        btn.dataset.col = c;
        btn.addEventListener('click', () => dropPiece(c));
        colButtonsEl.appendChild(btn);
        colBtns.push(btn);
      }

      // Build board cells (row 0 = top)
      boardEl.innerHTML = '';
      cells = [];
      for (let r = 0; r < ROWS; r++) {
        cells[r] = [];
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          boardEl.appendChild(cell);
          cells[r][c] = cell;
        }
      }

      setStatus(`${playerLabel('red')} ist dran`);
    }

    function playerLabel(player) {
      const color = player === 'red' ? '#e94560' : '#ffd700';
      const name = player === 'red' ? 'Rot' : 'Gelb';
      return `<span class="indicator ${player}"></span>${name}`;
    }

    function setStatus(html) {
      statusEl.innerHTML = html;
    }

    function dropPiece(col) {
      if (gameOver) return;

      // Find lowest empty row in this column
      let row = -1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (!grid[r][col]) { row = r; break; }
      }
      if (row === -1) return; // column full

      grid[row][col] = turn;
      cells[row][col].classList.add(turn);

      // Disable column if now full
      if (row === 0) colBtns[col].disabled = true;

      const winCells = checkWin(row, col, turn);
      if (winCells) {
        gameOver = true;
        winCells.forEach(([r, c]) => cells[r][c].classList.add('win'));
        colBtns.forEach(b => b.disabled = true);
        setStatus(`${playerLabel(turn)} gewinnt! 🎉`);
        return;
      }

      if (isDraw()) {
        gameOver = true;
        colBtns.forEach(b => b.disabled = true);
        setStatus('Unentschieden!');
        return;
      }

      turn = turn === 'red' ? 'yellow' : 'red';
      setStatus(`${playerLabel(turn)} ist dran`);
    }

    function checkWin(row, col, player) {
      const directions = [
        [0, 1],   // horizontal
        [1, 0],   // vertical
        [1, 1],   // diagonal ↘
        [1, -1],  // diagonal ↙
      ];

      for (const [dr, dc] of directions) {
        const line = [[row, col]];

        for (const sign of [1, -1]) {
          let r = row + dr * sign, c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c] === player) {
            line.push([r, c]);
            r += dr * sign;
            c += dc * sign;
          }
        }

        if (line.length >= 4) return line;
      }
      return null;
    }

    function isDraw() {
      return grid[0].every(cell => cell !== null);
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>

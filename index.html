<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
    }

    h1 { margin-bottom: 1rem; font-size: 2rem; }

    .status {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      min-height: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: #0f3460;
      border-radius: 12px;
      padding: 12px;
    }

    .cell {
      width: clamp(80px, 22vw, 130px);
      height: clamp(80px, 22vw, 130px);
      background: #1a1a2e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #16213e; transform: scale(1.04); }

    .cell.x { color: #e94560; cursor: default; }
    .cell.o { color: #53a8b6; cursor: default; }
    .cell.taken { cursor: default; }

    .cell.win {
      animation: pulse 0.5s ease-in-out 3;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    button.reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="status" id="status"></div>
  <div class="board" id="board"></div>
  <button class="reset" id="reset">New Game</button>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6],         // diagonals
    ];

    let grid, turn, gameOver, cells;

    function init() {
      grid = Array(9).fill(null);
      turn = 'X';
      gameOver = false;

      boardEl.innerHTML = '';
      cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', () => play(i));
        boardEl.appendChild(cell);
        cells.push(cell);
      }

      setStatus();
    }

    function playerColor(p) {
      return p === 'X' ? '#e94560' : '#53a8b6';
    }

    function setStatus(msg) {
      if (msg) {
        statusEl.innerHTML = msg;
      } else {
        statusEl.innerHTML = `<span style="color:${playerColor(turn)};font-weight:bold">${turn}</span>&nbsp;'s turn`;
      }
    }

    function play(i) {
      if (gameOver || grid[i]) return;

      grid[i] = turn;
      cells[i].textContent = turn;
      cells[i].classList.add(turn.toLowerCase(), 'taken');

      const winLine = checkWin();
      if (winLine) {
        gameOver = true;
        winLine.forEach(idx => cells[idx].classList.add('win'));
        statusEl.innerHTML = `<span style="color:${playerColor(turn)};font-weight:bold">${turn}</span>&nbsp;wins! 🎉`;
        return;
      }

      if (grid.every(v => v)) {
        gameOver = true;
        statusEl.textContent = "It's a draw!";
        return;
      }

      turn = turn === 'X' ? 'O' : 'X';
      setStatus();
    }

    function checkWin() {
      for (const [a, b, c] of WIN_LINES) {
        if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>

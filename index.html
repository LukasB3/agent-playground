<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: black;
      color: #e0e0e0;
    }

    h1 { margin-bottom: 1rem; font-size: 2rem; }

    .status {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      min-height: 2rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 60px);
      grid-template-rows: repeat(6, 60px);
      gap: 4px;
      background: #1a1a2e;
      padding: 8px;
      border-radius: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell:hover { background: #1a2a50; }
    .cell.red { background: #e94560; }
    .cell.yellow { background: #ffd700; }

    .controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Connect 4</h1>
  <div class="status" id="status">Red's turn</div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button id="reset">New Game</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    const COLS = 7;
    const ROWS = 6;

    let grid, turn, gameOver, colHeights;

    function init() {
      grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
      colHeights = Array(COLS).fill(0);
      turn = 'red';
      gameOver = false;
      status.textContent = "Red's turn";
      
      board.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('button');
          cell.className = 'cell';
          cell.dataset.col = c;
          cell.dataset.row = r;
          cell.addEventListener('click', handleClick);
          board.appendChild(cell);
        }
      }
    }

    function handleClick(e) {
      if (gameOver) return;
      
      const col = +e.target.dataset.col;
      
      if (colHeights[col] >= ROWS) {
        alert('Column full!');
        return;
      }

      const row = ROWS - 1 - colHeights[col];
      grid[row][col] = turn;
      colHeights[col]++;

      updateDisplay();

      if (checkWin(row, col, turn)) {
        gameOver = true;
        status.textContent = `${turn === 'red' ? 'Red' : 'Yellow'} wins!`;
        return;
      }

      if (colHeights.every(h => h === ROWS)) {
        gameOver = true;
        status.textContent = 'Draw!';
        return;
      }

      turn = turn === 'red' ? 'yellow' : 'red';
      status.textContent = `${turn === 'red' ? 'Red' : 'Yellow'}'s turn`;
    }

    function updateDisplay() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board.children[r * COLS + c];
          if (grid[r][c]) {
            cell.classList.add(grid[r][c]);
          }
        }
      }
    }

    function checkWin(row, col, player) {
      const directions = [
        [0, 1],   // horizontal
        [1, 0],   // vertical
        [1, 1],   // diagonal
        [1, -1]   // anti-diagonal
      ];

      for (const [dr, dc] of directions) {
        let count = 1;
        
        // Check positive direction
        for (let i = 1; i < 4; i++) {
          const r = row + dr * i;
          const c = col + dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || grid[r][c] !== player) break;
          count++;
        }

        // Check negative direction
        for (let i = 1; i < 4; i++) {
          const r = row - dr * i;
          const c = col - dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || grid[r][c] !== player) break;
          count++;
        }

        if (count >= 4) return true;
      }

      return false;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello from James</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: purple;
      color: #e0e0e0;
    }

    h1 { margin-bottom: 1rem; font-size: 2rem; }

    .status {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      min-height: 2rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      color: #e0e0e0;
    }

    .cell:hover { background: #1a2a50; }
    .cell.x { color: #e94560; }
    .cell.o { color: #53a8b6; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease-in-out 2;
    }

    @keyframes pulse {
      50% { transform: scale(1.08); }
    }

    button.reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button class="reset" id="reset">New Game</button>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let cells, turn, gameOver;

    function init() {
      board.innerHTML = '';
      cells = Array(9).fill('');
      turn = 'X';
      gameOver = false;
      status.textContent = "X's turn";

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.addEventListener('click', handleClick);
        board.appendChild(cell);
      }
    }

    function handleClick(e) {
      const i = +e.target.dataset.index;
      if (gameOver || cells[i]) return;

      cells[i] = turn;
      e.target.textContent = turn;
      e.target.classList.add(turn.toLowerCase());

      const winLine = checkWin(turn);
      if (winLine) {
        gameOver = true;
        status.textContent = `${turn} wins!`;
        winLine.forEach(idx => board.children[idx].classList.add('win'));
        return;
      }

      if (cells.every(c => c)) {
        gameOver = true;
        status.textContent = "Draw!";
        return;
      }

      turn = turn === 'X' ? 'O' : 'X';
      status.textContent = `${turn}'s turn`;
    }

    function checkWin(player) {
      return WINS.find(line => line.every(i => cells[i] === player)) || null;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
